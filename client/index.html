<!doctype html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- ── Güvenlik ── -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://www.youtube-nocookie.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://img.youtube.com https://i.ytimg.com https://d2xsxph8kpxj0f.cloudfront.net;
      frame-src https://www.youtube.com https://www.youtube-nocookie.com;
      connect-src 'self' https://www.youtube.com https://naimaktas.github.io;
      media-src 'self' https://www.youtube.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <!-- ── SEO ── -->
    <title>Naim Aktaş Official — Türk Halk Müziği</title>
    <meta name="description" content="Naim Aktaş Resmi Müzik Kanalı. Türk halk müziği, türküler ve özel parçalar. 71 parça, 5 albüm. YouTube, Instagram ve Facebook'ta takip edin." />

    <meta property="og:locale" content="tr_TR" />
